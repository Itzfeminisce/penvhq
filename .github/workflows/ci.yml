name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node must be >=22.13 BEFORE pnpm runs — pnpm 11.3 imports node:sqlite.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      # Re-run setup-node now that pnpm is on PATH, to enable the pnpm cache.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # Build first: some tests load a scaffolded penv.config.ts that imports the
      # built package by name (turbo's `test`/`typecheck` already dependsOn `^build`;
      # the root `vitest run` bypasses that, so order it explicitly here).
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
